name: Release

# Tag push (`vX.Y.Z`) builds unsigned bundles on macOS / Linux / Windows and attaches
# them to a GitHub Release named after the tag. Manifests (`package.json`,
# `src-tauri/Cargo.toml`) must already match the tag version.
#
# `.app` is a directory, so the macOS bundle is tarred before upload. Bundles are
# unsigned (`tauri.conf.json` -> `signingIdentity: "-"`), so Gatekeeper will quarantine
# downloads. Real signed + notarized releases require Developer ID + secrets wired in
# via `tauri-action`.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          prefix-key: v1

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev cmake ninja-build libasound2-dev libfreetype6-dev libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev libgl1-mesa-dev

      - name: Install Ninja (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ninja --yes

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (CI, unsigned bundles)
        env:
          CARGO_BUILD_LOCKED: "1"
        run: pnpm run tauri:build:ci

      - name: Stage release files (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          set -euo pipefail
          mkdir -p release
          shopt -s nullglob
          for app in src-tauri/target/release/bundle/macos/*.app; do
            base=$(basename "$app" .app)
            tar -C "$(dirname "$app")" -czf "release/${base}-${GITHUB_REF_NAME}-macos-arm64.app.tar.gz" "$(basename "$app")"
          done
          for dmg in src-tauri/target/release/bundle/dmg/*.dmg; do
            cp "$dmg" "release/$(basename "$dmg" .dmg)-${GITHUB_REF_NAME}-macos-arm64.dmg"
          done

      - name: Stage release files (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          mkdir -p release
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/appimage/*.AppImage; do
            cp "$f" "release/$(basename "$f" .AppImage)-${GITHUB_REF_NAME}-linux-x86_64.AppImage"
          done
          for f in src-tauri/target/release/bundle/deb/*.deb; do
            cp "$f" "release/$(basename "$f" .deb)-${GITHUB_REF_NAME}-linux-x86_64.deb"
          done

      - name: Stage release files (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/nsis/*.exe; do
            cp "$f" "release/$(basename "$f" .exe)-${GITHUB_REF_NAME}-windows-x86_64.exe"
          done
          for f in src-tauri/target/release/bundle/msi/*.msi; do
            cp "$f" "release/$(basename "$f" .msi)-${GITHUB_REF_NAME}-windows-x86_64.msi"
          done

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: release/*
